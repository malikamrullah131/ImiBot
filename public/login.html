<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmiCare Secure Access - Login</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0c4a6e 100%);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #0ea5e9;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.15);
            outline: none;
        }

        .btn-premium {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(14, 165, 233, 0.6);
            filter: brightness(1.1);
        }

        .btn-premium:active {
            transform: translateY(0);
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-6 overflow-hidden">

    <!-- Decorative Elements -->
    <div class="absolute top-1/4 -left-20 w-64 h-64 bg-sky-500/20 rounded-full blur-[100px] animate-pulse"></div>
    <div class="absolute bottom-1/4 -right-20 w-64 h-64 bg-blue-500/20 rounded-full blur-[100px] animate-pulse" style="animation-delay: 2s"></div>

    <div id="login-container" class="glass-card w-full max-w-md p-10 rounded-[2.5rem] relative z-10 animate-in fade-in zoom-in duration-700">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-10">
            <div class="w-16 h-16 bg-sky-500 rounded-2xl flex items-center justify-center shadow-xl shadow-sky-500/20 mb-4 animate-bounce" style="animation-duration: 3s">
                <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight uppercase font-outfit">
                Immi<span class="text-sky-400">Care</span> Access
            </h1>
            <p class="text-sky-200/50 text-[10px] uppercase font-bold tracking-[0.2em] mt-1">Inovasi Media Informasi Pelayanan Paspor</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-sky-200/60 uppercase tracking-widest pl-1">Authorized Access Only</label>
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-sky-400/50 group-focus-within:text-sky-400 transition-colors">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <input type="password" id="password" name="password" placeholder="Masukan Password Admin" required
                        class="input-glass w-full pl-12 pr-6 py-4 rounded-2xl text-sm font-medium tracking-widest">
                </div>
            </div>

            <button type="submit" id="login-btn" class="btn-premium w-full py-4 rounded-2xl text-white font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                <span>Unlock Dashboard</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>

        <div id="error-msg" class="hidden mt-6 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-[10px] font-bold text-center uppercase tracking-widest">
            🛑 Akses Ditolak! Password Salah.
        </div>

        <div class="mt-10 pt-8 border-t border-white/5 flex flex-col items-center gap-4">
            <span class="text-[10px] text-slate-500 font-medium uppercase tracking-[0.3em]">ImmiCare v4.0.5 Pro</span>
        </div>
    </div>

    <script>
        // Init Icons
        lucide.createIcons();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const container = document.getElementById('login-container');
            const errorMsg = document.getElementById('error-msg');
            const password = document.getElementById('password').value;

            // Loading State
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i><span>Verifying...</span>';
            lucide.createIcons();
            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    // Success Burst
                    btn.classList.add('bg-emerald-500');
                    btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i><span>Authenticated!</span>';
                    lucide.createIcons();
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 500);
                } else {
                    throw new Error('Unauthorized');
                }
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = '<span>Try Again</span><i data-lucide="arrow-right" class="w-4 h-4"></i>';
                lucide.createIcons();
                
                // Shake Animation
                container.classList.add('shake');
                errorMsg.classList.remove('hidden');
                setTimeout(() => container.classList.remove('shake'), 500);
            }
        });

        // Auto-focus
        document.getElementById('password').focus();
    </script>
</body>
</html>
